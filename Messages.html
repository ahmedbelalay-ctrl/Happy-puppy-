<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسائل - Happy Puppy</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold: #D4A373; --dark-brown: #5C4033; --bg-color: #FEFAE0; }
        body { margin: 0; font-family: 'Baloo Bhaijaan 2', sans-serif; background: var(--bg-color); color: var(--dark-brown); }
        header { padding: 15px 5%; background: var(--dark-brown); color: white; display: flex; justify-content: space-between; }
        header a { color: white; text-decoration: none; font-size: 1.5rem; }
        .msg-container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .msg-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border-right: 5px solid var(--primary-gold); }
        .msg-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; color: var(--dark-brown); }
        .msg-text { font-size: 1.1rem; }
        .new-badge { background: #ff4d4d; color: white; font-size: 0.8rem; padding: 3px 8px; border-radius: 10px; margin-right: 10px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="font-family: 'Fredoka', sans-serif;">Happy Puppy</a>
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
    </header>

    <div class="msg-container">
        <h2><i class="fas fa-envelope-open-text"></i> صندوق الرسائل</h2>
        <div id="messagesList"></div>
    </div>

    <script>
        let messages = JSON.parse(localStorage.getItem('messages')) || [];
        const msgList = document.getElementById('messagesList');

        if(messages.length === 0) {
            msgList.innerHTML = '<p style="text-align:center; font-size:1.2rem;">لا يوجد رسائل حتى الآن.</p>';
        } else {
            // عرض الرسائل من الأحدث للأقدم
            messages.reverse().forEach(msg => {
                let badgeHTML = msg.read === false ? '<span class="new-badge">جديدة</span>' : '';
                msgList.innerHTML += `
                    <div class="msg-card">
                        <div class="msg-title">بخصوص الإعلان: ${msg.petName} ${badgeHTML}</div>
                        <div class="msg-text">${msg.content}</div>
                    </div>
                `;
            });

            // تحويل كل الرسائل لـ "مقروءة" عشان عداد الجرس يصفر
            messages.forEach(msg => msg.read = true);
            localStorage.setItem('messages', JSON.stringify(messages.reverse())); // نرجع الترتيب الأصلي ونحفظ
        }
    </script>
</body>
</html>
