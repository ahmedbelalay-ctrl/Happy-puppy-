<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قطط للتبني 🐱</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold: #D4A373; --dark-brown: #5C4033; --bg-color: #FEFAE0; }
        body { margin: 0; font-family: 'Baloo Bhaijaan 2', sans-serif; background: var(--bg-color); color: var(--dark-brown); }
        header { padding: 15px 5%; background: var(--dark-brown); color: white; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Fredoka', sans-serif; font-size: 1.5rem; text-decoration: none; color: white; }
        main { padding: 40px 5%; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-content { padding: 20px; }
        .btn-adopt { display: block; width: 100%; padding: 10px; background: var(--primary-gold); color: white; text-align: center; border-radius: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Happy Puppy 🐾</a>
        <a href="profile.html"><i class="fas fa-user-circle" style="font-size: 1.5rem; color: white;"></i></a>
    </header>

    <main>
        <h2 style="text-align: center;">أصدقاء ناعمين 🐱</h2>
        <div class="cards-grid" id="cats-container"></div>
    </main>

    <script>
        const pets = JSON.parse(localStorage.getItem('pets')) || [];
        const container = document.getElementById('cats-container');
        const cats = pets.filter(p => p.type === 'قطة');

        if(cats.length === 0) container.innerHTML = '<p>مفيش قطط حالياً 🥺</p>';
        
        cats.reverse().forEach(pet => {
            container.innerHTML += `
                <div class="card">
                    <img src="${pet.image}">
                    <div class="card-content">
                        <h3>${pet.name}</h3>
                        <p>📍 ${pet.location}</p>
                        <a href="details.html?id=${pet.id}" class="btn-adopt">اقرأ التفاصيل 🐾</a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
