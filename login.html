<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Happy Puppy</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold: #D4A373; --dark-brown: #5C4033; --bg-color: #FEFAE0; }
        body { margin: 0; font-family: 'Baloo Bhaijaan 2', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { font-size: 2rem; color: var(--dark-brown); font-family: 'Fredoka', sans-serif; margin-bottom: 20px; display: block; text-decoration: none; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; font-weight: bold; color: var(--dark-brown); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--dark-brown); color: white; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; font-family: inherit; margin-top: 10px; }
        .toggle-link { color: var(--primary-gold); cursor: pointer; margin-top: 15px; display: block; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-box">
        <a href="index.html" class="logo">Happy Puppy 🐾</a>
        <h2 id="formTitle">سجل الأول يا حبيبي 😉</h2>
        
        <div id="loginForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" placeholder="اكتب اسمك">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="اكتب الباسورد">
            </div>
            <button class="btn-main" onclick="handleAuth()">دخول</button>
        </div>

        <span class="toggle-link" onclick="toggleMode()" id="toggleText">معندكش حساب؟ اعمل حساب جديد من هنا</span>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('formTitle').innerText = isLoginMode ? 'سجل الأول يا حبيبي 😉' : 'حساب جديد ✨';
            document.getElementById('toggleText').innerText = isLoginMode ? 'معندكش حساب؟ اعمل حساب جديد من هنا' : 'عندك حساب؟ سجل دخول من هنا';
        }

        function handleAuth() {
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();

            if(!userVal || !passVal) {
                alert("اكتب الاسم والباسورد الأول!"); return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || [];

            if (isLoginMode) {
                // تسجيل دخول
                let foundUser = users.find(u => u.username === userVal && u.password === passVal);
                if (foundUser) {
                    localStorage.setItem('currentUser', JSON.stringify(foundUser));
                    alert("نورتنا يا غالي! 💖");
                    window.location.href = 'index.html'; // يرجع للرئيسية
                } else {
                    alert("الاسم أو الباسورد غلط، جرب تاني!");
                }
            } else {
                // حساب جديد
                let exists = users.find(u => u.username === userVal);
                if (exists) {
                    alert("الاسم ده متسجل قبل كده، اختار اسم تاني!");
                } else {
                    let newUser = { id: 'user_' + Date.now(), username: userVal, password: passVal };
                    users.push(newUser);
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(newUser));
                    alert("تم إنشاء الحساب بنجاح! 🎉");
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>
