<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الحيوان - Happy Puppy</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // كود الحماية
        if (!localStorage.getItem('currentUser')) {
            alert("سجل الأول يا حبيبي عشان تقدر تشوف التفاصيل وتبعث رسالة! 😉🐾");
            window.location.href = "login.html";
        }
    </script>
    <style>
        :root { --primary-gold: #D4A373; --dark-brown: #5C4033; --bg-color: #FEFAE0; }
        body { margin: 0; font-family: 'Baloo Bhaijaan 2', sans-serif; background: var(--bg-color); color: var(--dark-brown); }
        header { padding: 15px 5%; background: var(--dark-brown); color: white; display: flex; justify-content: space-between; }
        header a { color: white; text-decoration: none; font-size: 1.5rem; }
        .details-container { max-width: 600px; margin: 30px auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .details-img { width: 100%; height: 350px; object-fit: cover; }
        .content { padding: 20px; }
        .pet-name { font-size: 2rem; margin: 0 0 10px 0; }
        .tag { background: var(--bg-color); padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-left: 10px; display: inline-block; margin-bottom: 10px;}
        .msg-box { margin-top: 30px; border-top: 2px solid var(--bg-color); padding-top: 20px; }
        textarea { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #ddd; font-family: inherit; box-sizing: border-box; margin-bottom: 10px; }
        .send-btn { width: 100%; padding: 12px; background: var(--dark-brown); color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="font-family: 'Fredoka', sans-serif;">Happy Puppy 🐾</a>
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
    </header>

    <div class="details-container" id="petDetailsBlock"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        const pets = JSON.parse(localStorage.getItem('pets')) || [];
        const pet = pets.find(p => p.id == petId);

        if (pet) {
            document.getElementById('petDetailsBlock').innerHTML = `
                <img src="${pet.image}" class="details-img">
                <div class="content">
                    <h1 class="pet-name">${pet.name} 💖</h1>
                    <div class="tag"><i class="fas fa-paw"></i> ${pet.type}</div>
                    <div class="tag"><i class="fas fa-venus-mars"></i> ${pet.gender}</div>
                    <div class="tag"><i class="fas fa-calendar"></i> ${pet.age}</div>
                    <p><strong><i class="fas fa-map-marker-alt"></i> الموقع:</strong> ${pet.location}</p>
                    <p><strong>التفاصيل:</strong> ${pet.details}</p>

                    <div class="msg-box">
                        <h3>تواصل مع صاحب الإعلان 💌</h3>
                        <textarea id="msgContent" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>
                        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> إرسال الرسالة</button>
                    </div>
                </div>
            `;
        } else {
            document.getElementById('petDetailsBlock').innerHTML = '<h3 style="text-align:center; padding:20px;">هذا الإعلان غير موجود.</h3>';
        }

        function sendMessage() {
            const msgText = document.getElementById('msgContent').value;
            if(msgText.trim() === "") {
                alert("اكتب رسالة أولاً!"); return;
            }
            
            let messages = JSON.parse(localStorage.getItem('messages')) || [];
            messages.push({
                petName: pet.name,
                content: msgText,
                timestamp: Date.now(),
                toUserId: pet.authorId, // كده الرسالة هتروح لصاحب الإعلان وتظهر في البروفايل بتاعه
                read: false 
            });
            localStorage.setItem('messages', JSON.stringify(messages));
            
            alert("تم إرسال رسالتك بنجاح! 🎉");
            document.getElementById('msgContent').value = "";
        }
    </script>
</body>
</html>
