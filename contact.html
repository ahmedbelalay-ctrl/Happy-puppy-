<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تواصل معنا</title>
  <style>
    body { font-family: Tahoma; background:#fdfaf3; margin:0; padding:20px; }
    h1 { text-align:center; color:#4a3c2a; }
    form { max-width:400px; margin:20px auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    input, textarea { width:100%; margin:10px 0; padding:10px; border:1px solid #ccc; border-radius:5px; }
    button { background:#4a3c2a; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#6a5840; }
  </style>
</head>
<body>

<h1>تواصل معنا 📧</h1>
<form>
  <input type="text" placeholder="اسمك">
  <input type="email" placeholder="بريدك الإلكتروني">
  <textarea placeholder="رسالتك"></textarea>
  <button type="submit">إرسال</button>
</form>

</body>
</html>
